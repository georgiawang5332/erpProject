{% extends 'dashboard/base.html' %}
{% block content %}

<div class="content-wrapper" style="min-height: 244.792px;">
  <!-- Content Header (Page header) -->
  <div class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1 class="m-0">新增 婚禮預算表</h1>
        </div><!-- /.col -->
      </div><!-- /.row -->
    </div><!-- /.container-fluid -->
  </div>
  <!-- /.content-header -->

  <!-- Main content -->
  <div class="content">
    <div class="container-fluid">
      <div class="row">

        <div class="container mt-4">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item">
                <a href="">婚禮預算表</a>
              </li>
              <li class="breadcrumb-item active" aria-current="page">新增 婚禮預算表</li>
            </ol>
          </nav>

          <div class="card">
            <div class="card-body">
              <form action="" method="post">
                {% csrf_token %}
            
                <div class="form-group">
                    <label for="">類別</label>
                    <select name="category">
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="">支出項目</label>
                    <input type="text" class="form-control form-control-sm" name="expenditure_items"
                           value="{{create_budget_sheets.expenditure_items}}" />
                </div>
                <div class="form-group">
                    <label for="">預計數量</label>
                    <input type="text" class="form-control form-control-sm" name="estimated_quantity"
                           value="{{create_budget_sheets.estimated_quantity}}" />
                </div>
                <div class="form-group">
                    <label for="">預計單價</label>
                    <input type="text" class="form-control form-control-sm" name="estimated_unit_price"
                           value="{{create_budget_sheets.estimated_unit_price}}" />
                </div>
                <div class="form-group">
                    <label for="">貨幣</label>
                    <select name="currency">
                        {% for currency in currencies %}
                        <option value="{{ currency.id }}">{{ currency.name }} ({{ currency.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="">備註1</label>
                    <input type="text" class="form-control form-control-sm" name="remark_one"
                           value="{{create_budget_sheets.remark_one}}" />
                </div>
                <div class="form-group">
                    <label for="">實際數量</label>
                    <input type="text" class="form-control form-control-sm" name="actual_quantity"
                           value="{{create_budget_sheets.actual_quantity}}" />
                </div>
                <div class="form-group">
                    <label for="">實際單價</label>
                    <input type="text" class="form-control form-control-sm" name="actual_unit_price"
                           value="{{create_budget_sheets.actual_unit_price}}" />
                </div>
                <div class="form-group">
                    <label for="">付款人</label>
                    <input type="text" class="form-control form-control-sm" name="payer"
                           value="{{create_budget_sheets.payer}}" />
                </div>
                <div class="form-group">
                    <label for="">備註2</label>
                    <input type="text" class="form-control form-control-sm" name="remark_two"
                           value="{{create_budget_sheets.remark_two}}" />
                </div>
            
                <input type="submit" value="Submit" class="btn btn-primary btn-primary-sm" />
            </form>
            </div>
          </div>
        </div>

      </div>
      <!-- /.row -->
      <div class="row">
        <a href="{% url 'budget:budget_sheet_click' %}" class="btn btn-primary-sm">
          << 返回 婚禮預算表之列表</a>
      </div>
    </div><!-- /.container-fluid -->
  </div>
  <!-- /.content -->
</div>

{% endblock %}
